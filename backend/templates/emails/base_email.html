<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Lets Keep Memories{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f1ee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f1ee;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:480px;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(20,16,12,0.08);">
          <tr>
            <td style="padding:28px 32px;border-bottom:1px solid #f1ece6;">
              <span style="font-size:18px;font-weight:700;letter-spacing:-0.01em;color:#1f1a17;">Lets Keep Memories</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;background-color:#faf7f4;">
              <p style="margin:0;font-size:12px;line-height:18px;color:#9a8f86;">
                You're receiving this email because you have an account on Lets Keep Memories.
                If this wasn't you, you can safely ignore it.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
