<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Lets Keep Memories{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#E6E9FF;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#E6E9FF;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:480px;background-color:#F2F4FF;border-radius:24px;overflow:hidden;box-shadow:0 8px 32px 0 rgba(108,124,255,0.15);border:1px solid #D1D8FF;">
          <tr>
            <td style="padding:28px 32px;border-bottom:1px solid #D1D8FF;background-color:#ffffff;">
              <img
                src="{{ frontend_url }}/logos/light_full.png"
                alt="Lets Keep Memories"
                width="180"
                style="display:block;width:180px;max-width:180px;height:auto;"
              >
            </td>
          </tr>
          <tr>
            <td style="padding:32px;background-color:#ffffff;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px;background-color:#F2F4FF;">
              <p style="margin:0;font-size:12px;line-height:18px;color:#64748b;">
                You're receiving this email because you have an account on Lets Keep Memories.
                If this wasn't you, you can safely ignore it.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
